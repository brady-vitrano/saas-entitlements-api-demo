name: saas-entitlements-api

services:
  app:
    build:
      context: .
    image: ${APP_IMAGE:-saas-entitlements/spring:local}
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SERVER_PORT: "8080"
      SQLITE_DB_PATH: /data/app.db
    volumes:
      - entitlements-data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  entitlements-data: